name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup config
        run: cp config/config.sample.yaml config/config.yaml

      - name: Lint
        run: yarn lint

      - name: Run tests
        run: yarn test

      - name: Build frontend
        run: yarn workspace @llm-proxy/frontend exec -- vite build
