name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

jobs:
  # ── Test & lint on every push/PR ──
  ci:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TEMPLATE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main/config/templates.json"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup config
        run: |
          cat > config/config.yaml << 'CONFIG_EOF'
          providers: {}
          model_aliases: {}
          CONFIG_EOF

      - name: Lint
        run: yarn lint

      - name: Run tests
        run: yarn test

      - name: Build frontend
        run: yarn workspace @llm-proxy/frontend exec -- vite build

  # ── Build desktop client (every push to main; release on tag) ──
  release:
    if: github.event_name == 'push'
    runs-on: macos-latest
    timeout-minutes: 30

    env:
      TEMPLATE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main/config/templates.json"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup config
        run: |
          cat > config/config.yaml << 'CONFIG_EOF'
          providers: {}
          model_aliases: {}
          CONFIG_EOF

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        run: yarn workspace @llm-proxy/frontend exec -- vite build

      - name: Build backend (tsc)
        run: cd apps/my-gateway-client && yarn workspace @llm-proxy/backend exec -- tsc 2>&1 || echo "tsc warnings ignored"

      - name: Build desktop app (electrobun)
        run: |
          cd apps/my-gateway-client
          bunx electrobun build 2>&1
        shell: bash

      - name: Bundle resources
        run: |
          cd apps/my-gateway-client
          APP=$(find build -name "LLM Proxy Gateway*.app" -type d -maxdepth 3 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "No .app bundle found, skipping bundle"
            exit 0
          fi
          RESOURCES="$APP/Contents/Resources"
          # Backend dist
          if [ -d "../../packages/backend/dist" ]; then
            mkdir -p "$RESOURCES/backend"
            cp -r "../../packages/backend/dist/." "$RESOURCES/backend/"
          fi
          # Config
          mkdir -p "$RESOURCES/config"
          cp ../../config/config.yaml "$RESOURCES/config/" 2>/dev/null || true
          # Frontend dist
          if [ -d "../../packages/frontend/dist" ]; then
            mkdir -p "$RESOURCES/frontend"
            cp -r "../../packages/frontend/dist/." "$RESOURCES/frontend/"
          fi
          # App icon
          if [ -f "../../packages/frontend/public/AppIcon.icns" ]; then
            cp "../../packages/frontend/public/AppIcon.icns" "$RESOURCES/AppIcon.icns"
          fi
          # Tray icon
          if [ -f "../../packages/frontend/public/tray-icon.png" ]; then
            cp "../../packages/frontend/public/tray-icon.png" "$RESOURCES/tray-icon.png"
          fi
          echo "Bundle done: $RESOURCES"
        shell: bash

      - name: Package artifact
        run: |
          cd apps/my-gateway-client
          APP=$(find build -name "LLM Proxy Gateway*.app" -type d -maxdepth 3 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "No .app bundle found"
            exit 1
          fi
          SHA=$(git rev-parse --short HEAD)
          ARTIFACT_DIR="$GITHUB_WORKSPACE"
          ZIP="LLM-Proxy-Gateway-${SHA}-macos-arm64.zip"
          ditto -c -k --keepParent "$APP" "${ARTIFACT_DIR}/${ZIP}"
          echo "artifact_name=${ZIP}" >> $GITHUB_ENV
          echo "artifact_path=${ARTIFACT_DIR}/${ZIP}" >> $GITHUB_ENV

      - name: Upload artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: ${{ env.artifact_path }}
          retention-days: 7

      # ── Release only on tag ──
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          name: "LLM Proxy Gateway ${{ github.ref_name }}"
          body: |
            ## LLM Proxy Gateway ${{ github.ref_name }}

            ### 下载 / Download
            - [macOS ARM64](LLM-Proxy-Gateway-${{ github.ref_name }}-macos-arm64.zip)

            ### 更新说明 / Changelog
            See commits since previous release.
          files: |
            ${{ env.artifact_path }}
          generate_release_notes: true
